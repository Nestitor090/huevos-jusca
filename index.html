<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>JUSCA - Sitio en mantenimiento</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#fff8e7,#ffe8b5);
      font-family:Arial, sans-serif;
      overflow:hidden;
    }

    .container{
      text-align:center;
      background:white;
      padding:50px 40px;
      border-radius:30px;
      box-shadow:0 10px 40px rgba(0,0,0,0.1);
      max-width:500px;
      width:90%;
      animation:fadeIn 1s ease;
    }

    .egg{
      font-size:90px;
      animation:float 2.5s ease-in-out infinite;
      margin-bottom:20px;
    }

    h1{
      color:#8b5e3c;
      font-size:2.8rem;
      margin-bottom:15px;
    }

    p{
      color:#666;
      font-size:1.1rem;
      line-height:1.6;
      margin-bottom:25px;
    }

    .badge{
      display:inline-block;
      padding:10px 20px;
      border-radius:50px;
      background:#f7c948;
      color:#5c3b00;
      font-weight:bold;
      font-size:0.95rem;
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-12px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:600px){
      h1{
        font-size:2rem;
      }

      .egg{
        font-size:70px;
      }

      p{
        font-size:1rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="egg">🥚</div>

    <h1>Sitio en mantenimiento</h1>

    <p>
      Estamos realizando mejoras para brindarte una mejor experiencia.
      Volveremos muy pronto.
    </p>

    <div class="badge">
      JUSCA • Distribuidora de Huevos
    </div>
  </div>

</body>
</html>
